name: E2E Tests
description: Builds and runs E2E tests for the app on the current platform.

inputs:
  artifact-suffix:
    description: Suffix appended to the uploaded artifact name on failure (e.g. "release").
    required: false
    default: ""

runs:
  using: composite

  steps:
    - uses: actions/setup-node@v6.3.0
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Build app for E2E
      run: npm run test:e2e:build
      shell: bash

    - name: Run E2E tests (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run npm run test:e2e
      shell: bash

    - name: Run E2E tests
      if: runner.os != 'Linux'
      run: npm run test:e2e
      shell: bash

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-results-${{ runner.os }}${{ inputs.artifact-suffix != '' && format('-{0}', inputs.artifact-suffix) || '' }}
        path: |
          test-results/
          playwright-report/
        retention-days: 1
