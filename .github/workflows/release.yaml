name: Create release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  pull-requests: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.PUBLISH_GITHUB_TOKEN }}

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}
        with:
          title: Release
          version: npm run changesets:version
          createGithubReleases: false

      - name: Create draft release
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          npx @changesets/cli tag
          VERSION=$(node -p "require('./package.json').version")
          awk "/^## ${VERSION}$/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > /tmp/release-notes.md
          gh release create "v${VERSION}" --draft --title "v${VERSION}" --notes-file /tmp/release-notes.md --target $(git rev-parse HEAD) --repo CRRU-UK/photo-id-app
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}
