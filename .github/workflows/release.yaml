name: Create release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  pull-requests: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.1
        with:
          token: ${{ secrets.PUBLISH_GITHUB_TOKEN }}

      - uses: actions/setup-node@v7.0.0
        with:
          # Pinned: Node 24.16.0 broke @electron/get's binary download (silent
          # exit 0). Bisected to nodejs/node#63082 in the 24.16.0 release.
          node-version: 24.15.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}
        with:
          title: Release
          version: npm run changesets:version
          createGithubReleases: false

      - name: Create draft release
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Skip if the release already exists
          if gh release view "v${VERSION}" --repo CRRU-UK/photo-id-app >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists — skipping draft creation."
            exit 0
          fi

          npm run changesets:tag

          awk "/^## ${VERSION}$/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > /tmp/release-notes.md

          gh release create "v${VERSION}" --draft --title "v${VERSION}" --notes-file /tmp/release-notes.md --target $(git rev-parse HEAD) --repo CRRU-UK/photo-id-app
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}
