name: Changeset

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check-changeset:
    runs-on: ubuntu-latest

    name: Check changeset

    # Don't apply to changeset release or dependabot PRs, or with the skip label
    if: >-
      github.head_ref != 'changeset-release/main' &&
      !startsWith(github.head_ref, 'dependabot/') &&
      !contains(github.event.pull_request.labels.*.name, 'skip changeset')

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.4.0
        with:
          # Pinned: Node 24.16.0 broke @electron/get's binary download (silent
          # exit 0). Bisected to nodejs/node#63082 in the 24.16.0 release.
          node-version: 24.15.0
          cache: npm

      - name: Check for changeset
        run: npx --yes @changesets/cli status --since=origin/main
