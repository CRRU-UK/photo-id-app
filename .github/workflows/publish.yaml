name: Build and publish app
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - v*

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  pull-requests: write
  contents: write
  id-token: write

jobs:
  build:
    timeout-minutes: 15

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: import signing certificate into keychain before build
      - name: Import macOS signing certificate
        id: import-cert
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # macOS 15 requires codesign: to be explicitly included in the key partition list,
      # otherwise codesign blocks waiting for a GUI confirmation that never appears in CI
      - name: Allow codesign keychain access
        if: matrix.os == 'macos-latest'
        run: >
          security set-key-partition-list
          -S apple-tool:,apple:,codesign:
          -s -k "$KEYCHAIN_PASSWORD"
          ~/Library/Keychains/signing_temp.keychain-db
        env:
          KEYCHAIN_PASSWORD: ${{ steps.import-cert.outputs.keychain-password }}

      # Pre-store notarytool credentials in the signing keychain to avoid the keychain prompt that
      # blocks notarytool indefinitely in CI
      - name: Store notarytool credentials
        if: matrix.os == 'macos-latest'
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --keychain "$HOME/Library/Keychains/signing_temp.keychain-db"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Windows Defender scans files mid-rename during the Vite build, causing EPERM errors
      - name: Disable Windows Defender real-time monitoring
        if: matrix.os == 'windows-latest'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: pwsh

      # Windows: authenticate with Azure for code signing via OIDC
      - name: Login to Azure
        if: matrix.os == 'windows-latest'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Windows: install Azure Artifact Signing tools and create metadata for signtool. Forge's
      # windowsSign config reads the exported env vars to sign both the app executable (during
      # package) and the installer (during make).
      - name: Install Azure signing tools
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $buildToolsVersion = "10.0.26100.4188"
          $signingClientVersion = "1.0.95"
          $basePath = "$env:LOCALAPPDATA\ArtifactSigning"

          nuget install Microsoft.Windows.SDK.BuildTools `
            -Version $buildToolsVersion `
            -OutputDirectory "$basePath\BuildTools"

          nuget install Microsoft.Trusted.Signing.Client `
            -Version $signingClientVersion `
            -OutputDirectory "$basePath\SigningClient"

          $signtool = Get-ChildItem -Path "$basePath\BuildTools" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Error "signtool.exe not found in BuildTools package"
            exit 1
          }

          $dlib = Get-ChildItem -Path "$basePath\SigningClient" -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $dlib) {
            Write-Error "Azure.CodeSigning.Dlib.dll not found in SigningClient package"
            exit 1
          }

          $metadata = @{
            Endpoint = "${{ vars.AZURE_CODE_SIGNING_ENDPOINT }}"
            CodeSigningAccountName = "${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}"
            CertificateProfileName = "${{ vars.AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME }}"
          } | ConvertTo-Json

          $metadataPath = "$basePath\metadata.json"
          $metadata | Out-File -FilePath $metadataPath -Encoding utf8

          "AZURE_CODE_SIGNING_SIGNTOOL=$signtool" | Out-File -FilePath $env:GITHUB_ENV -Append
          "AZURE_CODE_SIGNING_DLIB=$dlib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "AZURE_CODE_SIGNING_METADATA=$metadataPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build app and add to release (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run publish
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build app and add to release (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run publish -- --arch=universal
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_KEYCHAIN_PROFILE: notarytool-profile

      - name: Build app and add to release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run publish
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Verify both the app executable and installer are signed before the release is published
      - name: Verify Windows signatures
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $failed = $false

          Get-ChildItem -Path out -Recurse -Include *.exe | ForEach-Object {
            $sig = Get-AuthenticodeSignature $_.FullName
            $relativePath = Resolve-Path -Relative $_.FullName

            if ($sig.Status -eq "Valid") {
              Write-Host "Signed: $relativePath ($($sig.SignerCertificate.Subject))"
            } else {
              Write-Host "::error::Unsigned or invalid: $relativePath (status: $($sig.Status))"
              $failed = $true
            }
          }

          if ($failed) {
            exit 1
          }

  e2e:
    needs: build

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    name: E2E (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/e2e
        with:
          artifact-suffix: release

  publish:
    needs: [build, e2e]

    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false --repo CRRU-UK/photo-id-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
