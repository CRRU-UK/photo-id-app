name: Build and publish app
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - v*

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  pull-requests: write
  contents: write
  id-token: write

jobs:
  build:
    timeout-minutes: 15

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: import signing certificate into keychain before build
      - name: Import macOS signing certificate
        id: import-cert
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # macOS 15 requires codesign: to be explicitly included in the key partition list,
      # otherwise codesign blocks waiting for a GUI confirmation that never appears in CI
      - name: Allow codesign keychain access
        if: matrix.os == 'macos-latest'
        run: >
          security set-key-partition-list
          -S apple-tool:,apple:,codesign:
          -s -k "$KEYCHAIN_PASSWORD"
          ~/Library/Keychains/signing_temp.keychain-db
        env:
          KEYCHAIN_PASSWORD: ${{ steps.import-cert.outputs.keychain-password }}

      # Pre-store notarytool credentials in the signing keychain to avoid the keychain prompt that
      # blocks notarytool indefinitely in CI
      - name: Store notarytool credentials
        if: matrix.os == 'macos-latest'
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --keychain "$HOME/Library/Keychains/signing_temp.keychain-db"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Windows Defender scans files mid-rename during the Vite build, causing EPERM errors
      - name: Disable Windows Defender real-time monitoring
        if: matrix.os == 'windows-latest'
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: pwsh

      # Windows: build only, signing happens before publish
      - name: Build app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run publish -- --dry-run
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Windows: sign artifacts via Azure Trusted Signing
      - name: Login to Azure
        if: matrix.os == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.AZURE_CODE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CODE_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: out/make/squirrel.windows/x64
          files-folder-filter: exe
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          file-digest: SHA256

      # Windows: publish the signed artifacts
      - name: Publish app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run publish -- --from-dry-run
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build app and add to release (macOS / Linux)
        if: matrix.os == 'macos-latest' || matrix.os == 'ubuntu-latest'
        run: npm run publish
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_KEYCHAIN_PROFILE: notarytool-profile

      # Always runs so submission status is visible even if the publish step times out
      - name: Check macOS submission history
        if: matrix.os == 'macos-latest' && always()
        run: >
          xcrun notarytool history
          --keychain-profile "notarytool-profile"
          --keychain "$HOME/Library/Keychains/signing_temp.keychain-db"

  e2e:
    needs: build

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    name: E2E (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/e2e
        with:
          artifact-suffix: release

  publish:
    needs: [build, e2e]

    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false --repo CRRU-UK/photo-id-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
