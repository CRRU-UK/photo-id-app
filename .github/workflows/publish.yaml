name: Build and publish app
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - v*

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  pull-requests: write
  contents: write

jobs:
  release:
    timeout-minutes: 60

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: import signing certificate into keychain before build
      - name: Import macOS signing certificate
        id: import-cert
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # macOS 15 requires codesign: to be explicitly included in the key partition list,
      # otherwise codesign blocks waiting for a GUI confirmation that never appears in CI
      - name: Allow codesign keychain access
        if: matrix.os == 'macos-latest'
        run: >
          security set-key-partition-list
          -S apple-tool:,apple:,codesign:
          -s -k "$KEYCHAIN_PASSWORD"
          ~/Library/Keychains/signing_temp.keychain-db
        env:
          KEYCHAIN_PASSWORD: ${{ steps.import-cert.outputs.keychain-password }}

      # Windows: publish without signing
      - name: Build app and add to release (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run publish
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build app and add to release (macOS / Linux)
        if: matrix.os == 'macos-latest' || matrix.os == 'ubuntu-latest'
        run: npm run publish
        env:
          CI: true
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-osx-sign,electron-notarize

  publish:
    needs: build

    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false --repo CRRU-UK/photo-id-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
